<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Vertical black line -->
  <line x1="40" y1="40" x2="40" y2="160" stroke="black" stroke-width="12" stroke-linecap="round" />

  <!-- Define the triangle as a clipping path -->
  <clipPath id="triangle-clip">
    <polygon points="48,100 166,40 168,160" />
  </clipPath>

  <!-- Triangle outline -->
  <polygon points="48,100 166,40 168,160" fill="none" stroke="black" stroke-width="12" stroke-linejoin="round" />

  <!-- Diagonal lines clipped to the triangle -->
  <g clip-path="url(#triangle-clip)" stroke="black" stroke-width="5">
    <!-- Equidistant parallel lines shifted to match triangle edge -->
    <line x1="0" y1="138" x2="165" y2="57" />
    <line x1="0" y1="148" x2="170" y2="70" />
    <line x1="0" y1="158" x2="180" y2="80" />
    <line x1="0" y1="168" x2="190" y2="90" />
    <line x1="0" y1="178" x2="200" y2="100" />
    <line x1="10" y1="188" x2="200" y2="110" />
    <line x1="20" y1="198" x2="200" y2="120" />
    <line x1="20" y1="208" x2="200" y2="130" />
  </g>
</svg>
